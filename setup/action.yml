name: 'Setup'
description: 'Setup runner'
inputs:
  checkout:
    description: 'Checkout repository'
    required: false
    default: 'true'
  node:
    description: 'Setup node and pnpm'
    required: false
    default: 'true'
  node-version:
    description: 'Override node version from .node-version file'
    required: false
    default: ''
  pnpm:
    description: 'Setup pnpm without node'
    required: false
    default: 'false'
  pnpm-cache:
    description: 'Paths to pnpm node_modules to cache'
    required: false
    default: 'node_modules'
  save-cache:
    description: 'Save cache when needed'
    required: false
    default: 'false'
  read-cache:
    description: 'Read cache when available'
    required: false
    default: 'true'
  apt-proxy:
    description: 'Setup apt proxy'
    required: false
    default: 'false'

runs:
  using: 'composite'

  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      if: inputs.checkout == 'true'
      with:
        show-progress: false

    - shell: bash
      if: inputs.node == 'true' || inputs.pnpm == 'true'
      run: |
        os='${{ runner.os != 'Linux' && format('-{0}', runner.os) || '' }}'
        arch='${{ runner.arch != 'X64' && format('-{0}', runner.arch) || '' }}'
        if [ -n "${{ inputs.node-version }}" ]; then
          echo "CACHE_KEY=node_modules${os}${arch}-${{
            inputs.node-version
          }}-${{
            hashFiles('package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml')
          }}" >> "$GITHUB_ENV"
        else
          echo "CACHE_KEY=node_modules${os}${arch}-${{
            hashFiles('.node-version', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml')
          }}" >> "$GITHUB_ENV"
        fi

    - uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      if: (inputs.node == 'true' || inputs.pnpm == 'true') && inputs.read-cache == 'true' && runner.os != 'Windows'
      id: node-modules-restore
      with:
        path: ${{ inputs.pnpm-cache }}
        key: ${{ env.CACHE_KEY }}
        enableCrossOsArchive: true

    - shell: bash
      if: (inputs.node == 'true' || inputs.pnpm == 'true') && inputs.read-cache == 'true'
      run: |
        echo 'CACHE_HIT=${{
          (steps.node-modules-restore.outputs.cache-hit == 'true') && 'true' || ''
        }}' >> "$GITHUB_ENV"

    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      if: inputs.node == 'true' || inputs.pnpm == 'true'
      with:
        cache: ${{ (env.CACHE_HIT != 'true' || runner.os == 'Windows') && inputs.read-cache == 'true' }}
        standalone: true

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      if: inputs.node == 'true'
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && '.node-version' || '' }}
        package-manager-cache: false

      # Ensure npm 11.5.1 or later for trusted publishing
      # https://docs.npmjs.com/trusted-publishers
    - shell: bash
      if: (inputs.node == 'true' || inputs.pnpm == 'true') && runner.os == 'Linux'
      run: |
        set -ex
        dpkg --compare-versions $(npm -v) lt 11.5.1 && (npm update -g npm; echo "updated npm to: $(npm -v)") || echo "npm is new enough: $(npm -v)"

    - if: (inputs.node == 'true' || inputs.pnpm == 'true') && (env.CACHE_HIT != 'true' || runner.os == 'Windows')
      shell: bash
      run: pnpm install --frozen-lockfile
      env:
        # Other environment variables
        HUSKY: '0' # By default do not run HUSKY install

    - if: (inputs.node == 'true' || inputs.pnpm == 'true') && inputs.save-cache == 'true' && env.CACHE_HIT != 'true' && runner.os != 'Windows'
      uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: ${{ inputs.pnpm-cache }}
        key: ${{ env.CACHE_KEY }}
        enableCrossOsArchive: true

    - if: inputs.apt-proxy == 'true'
      shell: bash
      run: |
        echo "::group::Preparing squid-deb-proxy"
        set -e
        sudo apt-get -qq update
        sudo apt-get install -y squid-deb-proxy
        {
          echo "ppa.launchpad.net"
          echo "ppa.launchpadcontent.net"
        } | sudo tee -a /etc/squid-deb-proxy/mirror-dstdomain.acl.d/containerbase.acl
        sudo systemctl reload squid-deb-proxy
        echo "::endgroup::"
